{% set version = "0.18" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-testit
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/testit_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/testit/testit_{{ version }}.tar.gz
  sha256: ab21b849cc5808991c160026acf0b348e45db617df23eac9c8d618afc339b508

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('testit')"           # [not win]
    - "\"%R%\" -e \"library('testit')\""  # [win]

about:
  home: https://github.com/yihui/testit
  license: MIT
  summary: Provides two convenience functions assert() and test_pkg() to facilitate testing R packages.
  license_family: MIT
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/MIT

extra:
  recipe-maintainers:
    - conda-forge/r
    - croth1
